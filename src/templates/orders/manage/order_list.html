{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">
    Order Management
</h1>

<table class="table table-bordered table-hover">

    <thead>
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Status</th>
            <th>Total</th>
            <th>Created</th>
        </tr>
    </thead>

    <tbody>

        {% for order in orders %}

        <tr>

            <td>
                <a href="{% url 'orders:manager_order_detail' order.id %}">
                    #{{ order.id }}
                </a>
            </td>

            <td>
                {{ order.customer_name }}
            </td>

            <td>
                {{ order.status }}
            </td>

            <td>
                ${{ order.total_price }}
            </td>

            <td>
                {{ order.created_at }}
            </td>

        </tr>

        {% empty %}

        <tr>
            <td colspan="5">
                No orders found.
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
