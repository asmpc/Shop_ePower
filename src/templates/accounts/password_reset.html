{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-5">

    <h2>Password reset</h2>

    <form method="post">

        {% csrf_token %}

        {{ form|crispy }}

        <button
            type="submit"
            class="btn btn-primary"
        >
            Send reset link
        </button>

    </form>

</div>

{% endblock %}
