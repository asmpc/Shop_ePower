{% extends "base.html" %}

{% block content %}

<form method="get" class="mb-4">

    <input
        type="text"
        name="search"
        placeholder="Search products..."
        value="{{ request.GET.search }}"
        class="form-control mb-2"
    >

    <select name="brand" class="form-control mb-2">
        <option value="">All brands</option>

        {% for b in brands %}
            <option value="{{ b.slug }}" {% if request.GET.brand == b.slug %}selected{% endif %}>
                {{ b.name }}
            </option>
        {% endfor %}
    </select>

    <select name="category" class="form-control mb-2">
        <option value="">All categories</option>

        {% for c in categories %}
            <option value="{{ c.slug }}" {% if request.GET.category == c.slug %}selected{% endif %}>
                {{ c.name }}
            </option>
        {% endfor %}
    </select>

    <select name="sort" class="form-control mb-2">
        <option value="">Default</option>
        <option value="name">Name A-Z</option>
        <option value="name_desc">Name Z-A</option>
        <option value="newest">Newest</option>
    </select>

    <button class="btn btn-primary">
        Apply
    </button>

</form>

<div class="container mt-4">

    <h2>Catalog</h2>

    <div class="row">

        {% for product in products %}

            <div class="col-md-3">

                <div class="card mb-3">

                    {% if product.images.first %}
                        <img src="{{ product.images.first.image.url }}"
                            class="card-img-top product-image">
                    {% endif %}

                    <div class="card-body">

                        <h5>{{ product.name }}</h5>

                            {{ product.final_price }}

                        <p>{{ product.brand.name }}</p>

                        <a href="{% url 'catalog:product_detail' product.slug %}" class="btn btn-primary">
                            View
                        </a>

                    </div>

                </div>

            </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
